version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: compliance-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.5
    container_name: compliance-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,kms,secretsmanager
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      # Persist state across restarts (optional — useful for dev)
      PERSIST: 1
      SNAPSHOT_SAVE_STRATEGY: ON_SHUTDOWN
      SNAPSHOT_LOAD_STRATEGY: ON_STARTUP
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack/init:/etc/localstack/init/ready.d
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  localstack_data:
